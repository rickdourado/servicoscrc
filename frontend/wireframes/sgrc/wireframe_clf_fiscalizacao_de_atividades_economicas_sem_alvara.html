<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fiscalização de atividades econômicas sem alvará - AS IS</title>
<style>
  body { font-family: Arial, sans-serif; font-size: 13px; background: #f0f0f0; padding: 20px; }
  fieldset { border: 1px solid #999; border-radius: 3px; padding: 15px; margin-bottom: 14px; background: #ebebeb; }
  legend { font-weight: bold; padding: 0 6px; }
  .row { display: grid; grid-template-columns: 190px 1fr; align-items: center; gap: 8px; margin-bottom: 7px; }
  label { text-align: right; }
  .req { color: #cc0000; font-weight: bold; }
  input { width: 100%; height: 24px; border: 1px solid #888; }
</style>
</head>
<body>
  <fieldset>
    <legend>SGRC - Atributos Específicos (CLF)</legend>
    
      <div class="row">
        <label >Endereço:</label>
        <input type="text" />
      </div>
      <div class="row">
        <label class="req">Número:</label>
        <input type="text" />
      </div>
      <div class="row">
        <label >CEP:</label>
        <input type="text" />
      </div>
      <div class="row">
        <label >Complemento:</label>
        <input type="text" />
      </div>
      <div class="row">
        <label >Ponto de Referência:</label>
        <input type="text" />
      </div>
      <div class="row">
        <label class="req">Atividades exercidas no local:</label>
        <input type="text" />
      </div>
      <div class="row">
        <label >Nome do estabelecimento:</label>
        <input type="text" />
      </div>
      <div class="row">
        <label class="req">Dias e horários em que a atividade é exercida:</label>
        <input type="text" />
      </div>
      <div class="row">
        <label class="req">É quiosque de praia? :</label>
        <input type="text" />
      </div>
      <div class="row">
        <label >Descrição detalhada da ocorrência:</label>
        <input type="text" />
      </div>
      <div class="row">
        <label class="req">Descrição:</label>
        <input type="text" />
      </div>
  </fieldset>
</body>
</html>

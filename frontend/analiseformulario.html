            color: var(--text-primary);

        }

        .form-select {
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: #fff;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            width: 300px; /* Reduzido de 380px */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;

        /* View Toggle (Tabs) */
        .view-toggle {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            gap: 4px;
        }

        .toggle-btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 7px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-gray);
            cursor: pointer;
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-btn:hover:not(.active) { color: var(--text-primary); background: rgba(0,0,0,0.03); }

        .toggle-btn.active {
            background: #fff;
            color: var(--primary-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .toggle-btn.active.desejavel {
            color: #d97706; /* Amber color for desirable */
        }

        /* Main View Container */
        .main-view {
            flex: 1;
            background: var(--surface-color);
            border: var(--border-main);
            box-shadow: var(--shadow-brutal);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .view-header {
            padding: 0.75rem 1.5rem;
            border-bottom: var(--border-main);
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        .view-label.as-is { background: #f1f5f9; color: #64748b; }
        .view-label.to-be { background: #fff7ed; color: #f78b1f; }

        .iframe-wrapper {
            flex: 1;
            width: 100%;
            height: 100%;
            background: #fff;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            transition: opacity 0.3s ease;
        }

        .loader-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--text-gray);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .loader-overlay.active { opacity: 1; pointer-events: all; }

        .empty-state {
            display: flex; direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 4rem; text-align: center; gap: 1.5rem; background: #fafafa;
        }

        .empty-text { font-size: 1.25rem; font-weight: 600; color: #94a3b8; max-width: 400px; }

        function showLoader() { loader.classList.add('active'); }
        function hideLoader() { loader.classList.remove('active'); }

        mainIframe.onload = hideLoader;

        function updateView() {
            if (!currentAsIsUrl) return;

            showLoader();
            emptyState.style.display = 'none';
            mainIframe.style.display = 'block';
            viewHeader.style.display = 'flex';
            viewToggle.style.visibility = 'visible';

            if (currentView === 'asis') {
                mainIframe.src = currentAsIsUrl + "?t=" + new Date().getTime();
                viewLabel.innerText = 'Versão Atual (SGRC)';
                viewLabel.className = 'view-label as-is';
            } else if (currentView === 'tobe') {
                const toBeUrl = toBeMapping[currentAsIsUrl];
                mainIframe.src = toBeUrl + "?t=" + new Date().getTime();
                viewLabel.innerText = 'Nova Versão (1:1)';
                viewLabel.className = 'view-label to-be';
            } else {
                const desUrl = desirableMapping[currentAsIsUrl] || toBeMapping[currentAsIsUrl]; // fallback to 1:1 if not defined
                mainIframe.src = desUrl + "?t=" + new Date().getTime();
                viewLabel.innerText = 'Versão Otimizada (Desejável)';
                viewLabel.className = 'view-label to-be desejavel';
            }
        }

        formSelector.addEventListener('change', (e) => {
            currentAsIsUrl = e.target.value;
            formNameDisplay.innerText = e.target.options[e.target.selectedIndex].text;
            updateView();
        });

        // Lógica de Upload
        const excelUpload = document.getElementById('excelUpload');
        excelUpload.addEventListener('change', async (e) => {
            if (e.target.files.length === 0) return;
            
            const file = e.target.files[0];
            const formData = new FormData();
            formData.append('file', file);
            
            showLoader();
            loader.innerText = 'Processando Planilha...';
            
            try {
                const response = await fetch('/api/upload-form', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.sucesso) {
                    alert(data.mensagem);
                    location.reload(); // Recarrega para atualizar a lista do dropdown
                } else {
                    alert('Erro ao processar: ' + (data.error || 'Erro desconhecido'));
                }
            } catch (err) {
                alert('Erro na conexão com o servidor.');
                console.error(err);
            } finally {
                hideLoader();
                loader.innerText = 'Carregando...';
                excelUpload.value = ''; // Limpa input
            }
        });

        toggleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                toggleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                updateView();
            });
        });

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado da Análise - CRC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .result-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            background: var(--surface-color);
            border: var(--border-main);
            box-shadow: var(--shadow-brutal);
            padding: 2.5rem;
            margin-top: 2rem;
        }

        .result-box {
            background: #f8fafc;
            border: 2px solid #cbd5e1;
            padding: 2rem;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 1rem;
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 300px;
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="analisecontrato.html" class="primary-btn" style="text-decoration: none; padding: 0.5rem 1rem; border-color: var(--border-color); background: var(--bg-color); color: var(--accent-color);">⬅ Voltar</a>
            <h1>Análise Processada</h1>
        </div>
    </header>

    <main class="app-main">
        <div class="result-container">
            <div>
                <h2 style="margin-bottom: 0;">Parecer Técnico (IA)</h2>
                <p class="subtitle" style="margin-bottom: 1rem;">Avaliação fiscal baseada nos critérios e formato do documento referenciado: <strong id="rFilename" style="color:var(--text-secondary); font-weight: 800;"></strong></p>
            </div>
            
            <div class="result-box" id="resultBlock">
                <!-- Data will be populated here -->
                Aguardando Resultados do Cache...
            </div>
            
            <div style="display: flex; justify-content: flex-end; margin-top: 1rem;">
                 <button class="primary-btn" onclick="window.print()" style="background: var(--sgrc-border); border-color: var(--sgrc-border); color: #fff;">🖨️ Imprimir Parecer</button>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const aiResult = sessionStorage.getItem('ai_result');
            const filename = sessionStorage.getItem('filename');
            
            if (filename) document.getElementById('rFilename').textContent = filename;
            
            if (aiResult) {
                document.getElementById('resultBlock').textContent = aiResult;
            } else {
                document.getElementById('resultBlock').textContent = 'Nenhum resultado processado retornado do servidor. Retorne à página anterior e envie novamente.';
            }
        });
    </script>
</body>
</html>

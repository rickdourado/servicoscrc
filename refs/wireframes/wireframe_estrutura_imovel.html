<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novo Chamado — Estrutura de Imóvel / Defesa Civil</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    font-size: 13px;
    background: #f0f0f0;
    padding: 0;
  }

  /* ── Abas ── */
  .tabs {
    display: flex;
    background: #c8c8c8;
    border-bottom: 2px solid #888;
  }
  .tab {
    padding: 6px 18px;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    border: 1px solid #999;
    border-bottom: none;
    background: #d8d8d8;
    color: #333;
    margin-right: 2px;
    border-radius: 3px 3px 0 0;
  }
  .tab.active {
    background: #ebebeb;
    color: #000;
    border-bottom: 2px solid #ebebeb;
    margin-bottom: -2px;
  }

  /* ── Wrapper ── */
  .form-wrapper {
    max-width: 780px;
    margin: 0 auto;
    padding: 14px 14px 16px;
  }

  /* ── Fieldsets ── */
  fieldset {
    border: 1px solid #999;
    border-radius: 3px;
    padding: 10px 14px 14px;
    margin-bottom: 14px;
    background: #ebebeb;
  }
  legend {
    font-size: 13px;
    font-weight: bold;
    color: #222;
    padding: 0 6px;
  }

  /* ── Grid de linha padrão ── */
  .row {
    display: grid;
    grid-template-columns: 190px 1fr;
    align-items: center;
    gap: 5px 8px;
    margin-bottom: 7px;
  }
  .row.top { align-items: flex-start; padding-top: 2px; }

  label {
    text-align: right;
    font-size: 13px;
    color: #222;
    line-height: 1.4;
  }
  label.req      { color: #cc0000; font-weight: bold; }
  label.req-blue { color: #0000cc; font-weight: bold; }

  /* ── Campos ── */
  input[type=text], select, textarea {
    font-size: 13px;
    border: 1px solid #888;
    background: #fff;
    padding: 2px 5px;
    border-radius: 2px;
    width: 100%;
    height: 24px;
    font-family: Arial, sans-serif;
  }
  textarea    { height: 90px; resize: vertical; }
  select[size]{ height: auto; }

  /* ── Helpers ── */
  .hint    { font-size: 11px; color: #555; font-style: italic; margin-top: 2px; }
  .static  { font-size: 13px; color: #222; }
  .subinfo { font-size: 12px; color: #444; margin-top: 2px; }
  .badge   {
    font-size: 11px; background: #e0e0e0; border: 1px solid #bbb;
    border-radius: 2px; padding: 2px 8px; color: #444; display: inline-block;
  }

  /* ── Field + botão ── */
  .fwb { display: flex; gap: 4px; align-items: center; }
  .fwb input { flex: 1; }
  .btn-icon {
    border: 1px solid #888; background: #3a6fbd; color: #fff;
    padding: 0 8px; font-size: 13px; cursor: pointer;
    border-radius: 2px; height: 24px;
  }
  .btn-icon:hover { background: #2f5ea0; }

  /* ── Listbox ── */
  .listbox {
    width: 100%; border: 1px solid #888; background: #fff;
    height: 82px; overflow-y: auto; font-size: 12px; margin-top: 4px;
  }
  .listbox option { padding: 3px 5px; }
  .listbox-yellow { background: #fffacd; }

  /* ── Botões ── */
  .btn-clear {
    display: inline-block; margin-top: 6px;
    border: 1px solid #888; background: #3a6fbd; color: #fff;
    padding: 4px 14px; font-size: 12px; border-radius: 3px; cursor: pointer;
  }
  .btn-clear:hover { background: #2f5ea0; }

  .btn-action {
    border: 1px solid #888; background: #3a6fbd; color: #fff;
    padding: 5px 14px; font-size: 13px; border-radius: 3px; cursor: pointer;
  }
  .btn-action:hover { background: #2f5ea0; }

  /* ── Dois colunas Número + CEP ── */
  .two-col {
    display: grid;
    grid-template-columns: 190px 110px 50px 1fr;
    align-items: center;
    gap: 5px 8px;
    margin-bottom: 7px;
  }
  .two-col label { text-align: right; }

  /* ── Checkbox ── */
  .chk-row {
    display: flex; align-items: center; gap: 6px;
    margin: 4px 0 6px 198px; font-size: 13px; color: #222;
  }

  /* ── Rodapé ── */
  .footer-bar {
    padding: 6px 0 8px;
  }
  .btn-cancel {
    border: 1px solid #888; background: #3a6fbd; color: #fff;
    padding: 5px 18px; font-size: 13px; border-radius: 3px; cursor: pointer;
  }
  .btn-cancel:hover { background: #2f5ea0; }
</style>
</head>
<body>

  <!-- ── Abas ── -->
  <div class="tabs">
    <div class="tab active">Pessoa</div>
    <div class="tab">Chamado</div>
  </div>

  <div class="form-wrapper">

    <!-- ══════════════════════════════════
         SEÇÃO 1 — CLASSIFICAÇÃO
    ══════════════════════════════════ -->
    <fieldset>
      <legend>Classificação</legend>

      <div class="row">
        <label class="req" for="categoria">Categoria:</label>
        <select id="categoria" style="width:300px;">
          <option selected>Serviço</option>
          <option>Informação</option>
          <option>Solicitação</option>
        </select>
      </div>

      <div class="row top">
        <label class="req" for="tipo-subtipo">Tipo/Subtipo:</label>
        <div>
          <div class="fwb">
            <input type="text" id="tipo-subtipo"
              value="Estrutura de Imóvel >> Vistoria em imóvel com rachadura e infilt..." />
            <button class="btn-icon">🔍</button>
          </div>
          <select class="listbox" size="5" id="tipo-lista">
            <option selected>Estrutura de Imóvel &gt;&gt; Vistoria em imóvel com rachadura e infiltração</option>
            <option>Estrutura de Imóvel &gt;&gt; Vistoria em imóvel apresentando trepidação</option>
            <option>Estrutura de Imóvel &gt;&gt; Vistoria em ameaça de desabamento de estrutura</option>
            <option>Estrutura de Imóvel &gt;&gt; Vistoria em desabamento de estrutura</option>
            <option>Estrutura de Imóvel &gt;&gt; Vistoria em ameaça ou queda de revestime...</option>
          </select>
          <button class="btn-clear">Limpar Seleção</button>
        </div>
      </div>
    </fieldset>

    <!-- ══════════════════════════════════
         SEÇÃO 2 — LOCALIZAÇÃO
    ══════════════════════════════════ -->
    <fieldset>
      <legend>Localização</legend>

      <div class="row">
        <label class="req" for="endereco">Endereço:</label>
        <div class="fwb">
          <input type="text" id="endereco" />
          <button class="btn-icon">🔍</button>
        </div>
      </div>

      <div class="row top">
        <label></label>
        <div>
          <select class="listbox listbox-yellow" size="4" id="endereco-lista"></select>
          <button class="btn-clear">Limpar Seleção</button>
        </div>
      </div>

      <div class="chk-row">
        <input type="checkbox" id="logradouro-inexistente" />
        <label for="logradouro-inexistente"
          style="text-align:left; font-weight:normal;">Logradouro Inexistente</label>
      </div>

      <div class="two-col">
        <label class="req" for="numero">Número:</label>
        <input type="text" id="numero" />
        <span style="text-align:right; font-size:13px; color:#222;">CEP:</span>
        <input type="text" id="cep" placeholder="__.___-___" />
      </div>

      <div class="row">
        <label for="complemento">Complemento:</label>
        <input type="text" id="complemento" style="background:#fffacd;" />
      </div>

      <div class="row top">
        <label for="ponto-ref">Ponto de Referência:</label>
        <textarea id="ponto-ref" style="height:52px;"></textarea>
      </div>

      <div class="row">
        <label></label>
        <button class="btn-action" style="width:fit-content;">Visualizar no Mapa</button>
      </div>
    </fieldset>

    <!-- ══════════════════════════════════
         SEÇÃO 3 — CHAMADOS EQUIVALENTES
    ══════════════════════════════════ -->
    <fieldset>
      <legend>Chamados Equivalentes</legend>
      <button class="btn-action">Buscar Equivalentes</button>
    </fieldset>

    <!-- ══════════════════════════════════
         SEÇÃO 4 — NOVO CHAMADO
    ══════════════════════════════════ -->
    <fieldset>
      <legend>Novo Chamado</legend>

      <div class="row">
        <label>Prazo:</label>
        <div><span class="badge">Prazo será exibido ao encaminhar o chamado</span></div>
      </div>

      <div class="row">
        <label>Unidade Organizacional:</label>
        <div>
          <span class="static">DEFESA CIVIL — Subsecretaria de Proteção e Defesa Civil</span>
          <div class="subinfo">A UO poderá ser alterada pela Distribuição de Endereço</div>
        </div>
      </div>

      <div class="row">
        <label for="tipo-solicitante">Tipo de solicitante:</label>
        <select id="tipo-solicitante" style="width:280px;">
          <option selected>Cidadão</option>
          <option>Servidor</option>
          <option>Colaborador Datamétrica</option>
          <option>Pessoa Física</option>
          <option>Contribuinte</option>
          <option>Órgãos Públicos</option>
          <option>Guarda Municipal</option>
        </select>
      </div>

      <div class="row">
        <label class="req" for="origem-ocorrencia">Origem da Ocorrência:</label>
        <select id="origem-ocorrencia" style="width:280px;">
          <option selected>Teleatendimento</option>
          <option>Departamental</option>
          <option>Aplicativo</option>
          <option>Presencial</option>
          <option>Aplicativo Web</option>
          <option>Carioca Digital</option>
          <option>Whatsapp</option>
          <option>1746 Na Pista</option>
          <option>Ouvidoria</option>
          <option>Facebook</option>
          <option>Agência 1746</option>
          <option>Conservação</option>
          <option>Chat PCRJ</option>
          <option>Agente Compstat</option>
        </select>
      </div>

      <div class="row">
        <label for="desc-origem">Descrição da Origem:</label>
        <input type="text" id="desc-origem" style="width:280px;" />
      </div>

      <div class="row">
        <label for="prioridade">Prioridade:</label>
        <select id="prioridade" style="width:280px;">
          <option>Alta</option>
          <option selected>Média</option>
          <option>Baixa</option>
        </select>
      </div>

      <div class="row">
        <label for="caminho-foto">Caminho da foto:</label>
        <input type="text" id="caminho-foto" />
      </div>
    </fieldset>

    <!-- ══════════════════════════════════
         SEÇÃO 5 — ATRIBUTOS ESPECÍFICOS
    ══════════════════════════════════ -->
    <fieldset>
      <legend>Atributos Específicos</legend>

      <div class="row">
        <label for="comunidade">Comunidade:</label>
        <div>
          <select id="comunidade">
            <option value="">Selecione</option>
            <option>Rocinha</option>
            <option>Complexo do Alemão</option>
            <option>Complexo da Maré</option>
            <option>Manguinhos</option>
            <option>Jacarezinho</option>
            <option>Cidade de Deus</option>
            <option>Vigário Geral</option>
            <option>Pavão-Pavãozinho</option>
            <option>Outros</option>
          </select>
          <div class="hint">(Selecione a comunidade da ocorrência.)</div>
        </div>
      </div>

      <div class="row top">
        <label class="req" for="descricao">Descrição:</label>
        <textarea id="descricao"></textarea>
      </div>
    </fieldset>

  </div>

  <!-- ── Rodapé ── -->
  <div class="form-wrapper" style="padding-top:0;">
    <div class="footer-bar">
      <button class="btn-cancel">Cancelar</button>
    </div>
  </div>

</body>
</html>
